global:
  scrape_interval: 10s
  scrape_timeout: 8s
  evaluation_interval: 10s

scrape_configs:
  - job_name: 'debezium-connect'
    static_configs:
      - targets: ['debezium:9999']
        labels:
          pipeline: 'cdc-ingestion'
          layer: 'bronze'

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
