services:
  source_db:
    container_name: source_db
    image: postgres:11
    hostname: source_db
    command: ["postgres", "-c", "wal_level=logical"]
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: source_db
      POSTGRES_PASSWORD: source_db
      POSTGRES_DB: source_db
    networks:
      - spark-network
    volumes:
      - source_db_data:/var/lib/postgresql/data

  minio:
    image: minio/minio
    container_name: datalake-minio
    hostname: minio
    ports:
      - "9002:9000"
      - "9003:9001"
    volumes:
      - minio_storage:/data
    environment:
      MINIO_ROOT_USER: minio_access_key
      MINIO_ROOT_PASSWORD: minio_secret_key
    command: server --console-address ":9001" /data
    networks:
      - spark-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - spark-network

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - spark-network

  debezium-connect:
    image: debezium/connect:2.4
    container_name: debezium-connect
    depends_on:
      - kafka
      - source_db
    ports:
      - "8084:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:29092
      GROUP_ID: 1
      CONFIG_STORAGE_TOPIC: connect_configs
      OFFSET_STORAGE_TOPIC: connect_offsets
      STATUS_STORAGE_TOPIC: connect_statuses
    networks:
      - spark-network


  spark-master:
    build:
      context: .
      dockerfile: DockerFile

    image: apache_spark:3.5.1
    container_name: spark-master
    ports:
      - "8080:8080"
      - "7077:7077"
      - "4040:4040"
      - "8888:8888"
    volumes:
      - K:\Data_Platform:/opt/spark-data
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    networks:
      - spark-network

  spark-worker-1:
    image: apache_spark:3.5.1
    container_name: spark-worker-1
    ports:
      - "8081:8081"
    volumes:
      - K:\Data_Platform:/opt/spark-data
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    depends_on:
      - spark-master
    networks:
      - spark-network

  spark-worker-2:
    image: apache_spark:3.5.1
    container_name: spark-worker-2
    ports:
      - "8082:8081" # Map cổng 8082 (máy ngoài) vào cổng 8081 (nội bộ container)
    volumes:
      - K:\Data_Platform:/opt/spark-data
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    depends_on:
      - spark-master
    networks:
      - spark-network


  spark-worker-3:
    image: apache_spark:3.5.1
    container_name: spark-worker-3
    ports:
      - "8083:8081"
    volumes:
      - K:\Data_Platform:/opt/spark-data
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    depends_on:
      - spark-master
    networks:
      - spark-network

  nifi:
    image: apache/nifi:latest
    container_name: nifi
    ports:
      - "8443:8443"
    environment:
      - SINGLE_USER_CREDENTIALS_USERNAME=admin
      - SINGLE_USER_CREDENTIALS_PASSWORD=adminadminadmin
    networks:
      - spark-network

  metastore-db:
    image: postgres:11
    container_name: metastore-db
    environment:
      POSTGRES_DB: metastore
      POSTGRES_USER: hive
      POSTGRES_PASSWORD: hive
    ports:
      - "5434:5432"
    networks:
      - spark-network

  hive-metastore:
    image: starburstdata/hive:3.1.2-e.18
    container_name: hive-metastore
    ports:
      - "9083:9083"
    environment:
      HIVE_METASTORE_JDBC_URL: jdbc:postgresql://metastore-db:5432/metastore
      HIVE_METASTORE_DRIVER: org.postgresql.Driver
      HIVE_METASTORE_USER: hive
      HIVE_METASTORE_PASSWORD: hive
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minio_access_key
      S3_SECRET_KEY: minio_secret_key
      S3_PATH_STYLE_ACCESS: "true"
      REGION: "us-east-1"
      GOOGLE_CLOUD_KEY_FILE_PATH: "none"
      AZURE_ADL_CLIENT_ID: "none"
      AZURE_ADL_CREDENTIAL: "none"
      AZURE_ADL_REFRESH_URL: "none"
      AZURE_ABFS_STORAGE_ACCOUNT: "none"
      AZURE_ABFS_ACCESS_KEY: "none"
      AZURE_ABFS_OAUTH: "none"
      AZURE_ABFS_OAUTH_TOKEN_PROVIDER: "none"
      AZURE_ABFS_OAUTH_CLIENT_ID: "none"
      AZURE_ABFS_OAUTH_SECRET: "none"
      AZURE_ABFS_OAUTH_ENDPOINT: "none"
      AZURE_WASB_STORAGE_ACCOUNT: "none"
      AZURE_WASB_ACCESS_KEY: "none"
    depends_on:
      - metastore-db
    networks:
      - spark-network

  # StarRocks (FE+BE trong 1 container - phu hop moi truong dev/demo).
  # Hostname "starrocks" phai khop voi warehouse/superset/CONNECTIONS.md
  # (starrocks://root:@starrocks:9030/) va voi transform/starrocks/*.sql
  # (kafka_broker_list tro toi service "kafka" tren cung spark-network).
  starrocks:
    image: starrocks/allin1-ubuntu:latest
    container_name: starrocks
    hostname: starrocks
    ports:
      - "8030:8030"   # FE HTTP (giao dien quan tri/monitor)
      - "9030:9030"   # FE MySQL protocol (mysql client, JDBC, Superset)
      - "8040:8040"   # BE HTTP (heartbeat/webserver)
    volumes:
      - starrocks_data:/data/deploy/starrocks
    networks:
      - spark-network
    depends_on:
      - kafka

  mock-api:
    build:
      context: .
      dockerfile: Dockerfile.python
    container_name: mock-api
    ports:
      - "5000:5000"
    command: ["python", "mock_api_server.py"]
    networks:
      - spark-network
    volumes:
      - K:\Data_Platform\data-generator:/app

  stream-simulator:
    build:
      context: .
      dockerfile: Dockerfile.python
    container_name: stream-simulator
    command: ["python", "data_stream_simulator.py"]
    networks:
      - spark-network
    volumes:
      - K:\Data_Platform\data-generator:/app
    environment:
      - PYTHONIOENCODING=utf-8
      - DB_HOST=source_db
      - DB_PORT=5432
    depends_on:
      - source_db
      - kafka

  data-master-gen:
    build:
      context: .
      dockerfile: Dockerfile.python
    container_name: data-master-gen
    profiles: ["manual"]
    command: ["python", "data-generator/data_master.py"]
    networks:
      - spark-network
    volumes:
      - K:\Data_Platform:/app
    depends_on:
      - source_db

  data-transactional-gen:
    build:
      context: .
      dockerfile: Dockerfile.python
    container_name: data-transactional-gen
    profiles: ["manual"]
    command: ["python", "data-generator/data_Transactional.py"]
    networks:
      - spark-network
    volumes:
      - K:\Data_Platform:/app
    environment:
      - MINIO_ENDPOINT=http://minio:9000
      - PYTHONIOENCODING=utf-8
    depends_on:
      - minio

volumes:
  minio_storage:
  source_db_data:
  starrocks_data:


networks:
  spark-network:
    external: true