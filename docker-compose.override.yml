# Override TAM THOI de chay luong Kien (khong dung file goc).
# Vá 2 khoảng trống hạ tầng của hive-metastore:
#   - driver JDBC Postgres (image hive 4.0.0 khong kem)
#   - hadoop-aws + aws-sdk + core-site (de HMS tao duoc thu muc tren S3/MinIO)
# Xoa file nay la tra ve trang thai goc.
services:
  hive-metastore:
    volumes:
      - ./_hivejars/postgresql-42.6.0.jar:/opt/hive/lib/postgresql.jar:ro
      - ./_hivejars/hadoop-aws-3.3.4.jar:/opt/hive/lib/hadoop-aws.jar:ro
      - ./_hivejars/aws-java-sdk-bundle-1.12.262.jar:/opt/hive/lib/aws-java-sdk-bundle.jar:ro
      - ./_hivejars/core-site.xml:/opt/hadoop/etc/hadoop/core-site.xml:ro
