# =====================================================================
# Data Lakehouse - Docker Compose skeleton
# Stack: MinIO, Kafka, Debezium, NiFi, Spark, Hive Metastore,
#        StarRocks, Trino, Superset, Airflow
# Lưu ý: đây là KHUNG để cả nhóm điền chi tiết theo phần mình phụ trách.
# Image không dùng Bitnami (đã bị gỡ khỏi Docker Hub) — dùng image chính chủ.
# =====================================================================

services:

  # ---------- STORAGE (Layer 3) ----------
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      retries: 5

  # Tạo sẵn các bucket: landing-zone, bronze, silver, gold
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD} &&
      mc mb -p local/landing-zone local/bronze local/silver local/gold &&
      exit 0"

  # ---------- BUFFER / CDC (Layer 2) — Kiên ----------
  kafka:
    image: apache/kafka:3.8.0        # KRaft mode, không cần Zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  debezium:
    image: debezium/connect:2.7
    depends_on: [kafka]
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: cdc-group
      CONFIG_STORAGE_TOPIC: connect_configs
      OFFSET_STORAGE_TOPIC: connect_offsets
      STATUS_STORAGE_TOPIC: connect_statuses
    # Đăng ký connector: POST file ingestion/debezium/register-connector.json
    # vào http://localhost:8083/connectors

  nifi:
    image: apache/nifi:1.27.0
    ports:
      - "8443:8443"
    environment:
      SINGLE_USER_CREDENTIALS_USERNAME: ${NIFI_USER}
      SINGLE_USER_CREDENTIALS_PASSWORD: ${NIFI_PASSWORD}
      NIFI_JVM_HEAP_INIT: 1g          # Kiên tuning heap size tại đây
      NIFI_JVM_HEAP_MAX: 2g
    volumes:
      - ./ingestion/nifi:/opt/nifi/templates

  # ---------- COMPUTE (Layer 3/4) — Kiên + Quân ----------
  spark-master:
    image: apache/spark:3.5.1
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "8081:8080"   # Spark Master UI
      - "7077:7077"
    environment:
      SPARK_NO_DAEMONIZE: "true"
    volumes:
      - ./ingestion/spark-batch:/opt/jobs/ingestion
      - ./transform:/opt/jobs/transform
      - ./jars:/opt/spark/extra-jars   # iceberg-spark-runtime, hadoop-aws, aws-sdk

  spark-worker:
    image: apache/spark:3.5.1
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    depends_on: [spark-master]
    environment:
      SPARK_NO_DAEMONIZE: "true"
      SPARK_WORKER_MEMORY: 2g          # executor memory tối thiểu ~471MB, để 2g cho an toàn
      SPARK_WORKER_CORES: 2
    volumes:
      - ./ingestion/spark-batch:/opt/jobs/ingestion
      - ./transform:/opt/jobs/transform
      - ./jars:/opt/spark/extra-jars

  # ---------- CATALOG (Layer 3) — Quân ----------
  metastore-db:
    image: postgres:16
    environment:
      POSTGRES_USER: hive
      POSTGRES_PASSWORD: ${METASTORE_DB_PASSWORD}
      POSTGRES_DB: metastore
    volumes:
      - metastore-db-data:/var/lib/postgresql/data

  hive-metastore:
    image: apache/hive:4.0.0
    depends_on: [metastore-db, minio]
    ports:
      - "9083:9083"
    environment:
      SERVICE_NAME: metastore
      DB_DRIVER: postgres
      SERVICE_OPTS: >-
        -Djavax.jdo.option.ConnectionDriverName=org.postgresql.Driver
        -Djavax.jdo.option.ConnectionURL=jdbc:postgresql://metastore-db:5432/metastore
        -Djavax.jdo.option.ConnectionUserName=hive
        -Djavax.jdo.option.ConnectionPassword=${METASTORE_DB_PASSWORD}

  # ---------- REAL-TIME OLAP (Layer 4) — Quân ----------
  starrocks:
    image: starrocks/allin1-ubuntu:3.3-latest
    ports:
      - "8030:8030"   # FE HTTP
      - "9030:9030"   # FE MySQL protocol
      - "8040:8040"   # BE
    # Routine Load config: transform/starrocks/routine_load.sql

  # ---------- QUERY ENGINE (Layer 4) — Trung ----------
  trino:
    image: trinodb/trino:453
    depends_on: [hive-metastore, minio]
    ports:
      - "8082:8080"
    volumes:
      - ./transform/metastore/trino-catalog:/etc/trino/catalog
      # catalog iceberg.properties trỏ tới hive-metastore:9083 + MinIO

  # ---------- PRESENTATION (Layer 5) — Trung ----------
  superset:
    image: apache/superset:4.0.2
    depends_on: [trino, starrocks]
    ports:
      - "8088:8088"
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
    # Sau khi up: superset db upgrade && superset init
    # Data connection: trino://... và starrocks (mysql protocol :9030)

  # ---------- ORCHESTRATION (Layer 6) — Thành ----------
  airflow-db:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: ${AIRFLOW_DB_PASSWORD}
      POSTGRES_DB: airflow
    volumes:
      - airflow-db-data:/var/lib/postgresql/data

  airflow:
    image: apache/airflow:2.10.2
    depends_on: [airflow-db]
    ports:
      - "8080:8080"
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:${AIRFLOW_DB_PASSWORD}@airflow-db/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      # Alert Telegram/Slack: xem orchestration/alerts/notify.py
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL}
    volumes:
      - ./orchestration/dags:/opt/airflow/dags
      - ./orchestration/plugins:/opt/airflow/plugins
      - ./orchestration/alerts:/opt/airflow/alerts
    command: standalone

  # ---------- CI/CD (Layer 7) — Thành ----------
  jenkins:
    image: jenkins/jenkins:lts
    ports:
      - "8090:8080"
    volumes:
      - jenkins-data:/var/jenkins_home
    # Pipeline: orchestration/jenkins/Jenkinsfile

volumes:
  minio-data:
  metastore-db-data:
  airflow-db-data:
  jenkins-data:
