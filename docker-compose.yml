# =====================================================================
# Data Lakehouse - Docker Compose skeleton
# Stack: MinIO, Kafka, Debezium, NiFi, Spark, Hive Metastore,
#        StarRocks, Trino, Superset, Airflow, Keycloak, Pipeline-API, Jenkins
# =====================================================================

services:

  # ---------- STORAGE (Layer 3) ----------
  minio:
    image: minio/minio:latest
    command: 'server /data --console-address ":9001"'
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # Console
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      retries: 5

  # Tạo bucket + user minio_access_key
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c " mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD} && mc mb -p local/landing-zone local/bronze local/silver local/gold local/lakehouse local/quarantine-zone && (mc admin user add local minio_access_key minio_secret_key || true) && (mc admin policy attach local readwrite --user minio_access_key || true) && exit 0"

  # ---------- OLTP DB (Source) ----------
  source_db:
    container_name: source_db
    image: postgres:11
    hostname: source_db
    command: ["postgres", "-c", "wal_level=logical"]
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: source_db
      POSTGRES_PASSWORD: source_db
      POSTGRES_DB: source_db
    volumes:
      - source_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U source_db -d source_db"]
      interval: 5s
      timeout: 5s
      retries: 20

  # ---------- BUFFER / CDC (Layer 2) — Kiên ----------
  kafka:
    image: apache/kafka:3.8.0 # KRaft mode, không cần Zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  kafka-init:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka-init
    depends_on:
      - kafka
    entrypoint: ["/bin/bash", "-c"]
    command: >
      "kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic postgres_server.public.Application --partitions 1 --replication-factor 1 &&
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic postgres_server.public.Application_History --partitions 1 --replication-factor 1 &&
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic postgres_server.public.Document --partitions 1 --replication-factor 1 &&
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic postgres_server.public.Applicant --partitions 1 --replication-factor 1"

  debezium:
    image: quay.io/debezium/connect:2.7
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      source_db:
        condition: service_healthy
    ports:
      - "8083:8083"
      - "8084:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: cdc-group
      CONFIG_STORAGE_TOPIC: connect_configs
      OFFSET_STORAGE_TOPIC: connect_offsets
      STATUS_STORAGE_TOPIC: connect_statuses
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8083/connectors >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 30
    restart: unless-stopped

  debezium-init:
    image: civic-service-data-platform-python:latest
    build:
      context: .
      dockerfile: Dockerfile.python
    container_name: debezium-init
    command: ["python", "/opt/project/scripts/init_debezium.py"]
    environment:
      - DEBEZIUM_CONNECT_URL=http://debezium:8083
      - DEBEZIUM_CONFIG_PATH=/opt/project/ingestion/debezium_config.json
    volumes:
      - ./:/opt/project:ro
    depends_on:
      debezium:
        condition: service_healthy

  nifi:
    image: apache/nifi:1.27.0
    ports:
      - "8443:8443"
    environment:
      SINGLE_USER_CREDENTIALS_USERNAME: ${NIFI_USER}
      SINGLE_USER_CREDENTIALS_PASSWORD: ${NIFI_PASSWORD}
      NIFI_JVM_HEAP_INIT: 1g
      NIFI_JVM_HEAP_MAX: 2g
      NIFI_WEB_PROXY_HOST: "nifi:8443,nifi,localhost:8443,localhost"
    volumes:
      - ./ingestion/nifi:/opt/nifi/templates

  # ---------- COMPUTE (Layer 3/4) — Kiên + Quân ----------
  spark-master:
    build:
      context: .
      dockerfile: DockerFile
    image: apache_spark:3.5.1
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "8081:8080" # Spark Master UI
      - "7077:7077"
    environment:
      SPARK_NO_DAEMONIZE: "true"
    volumes:
      - .:/opt/spark-data
      - ./ingestion/spark-batch:/opt/jobs/ingestion
      - ./transform:/opt/jobs/transform
      - ./jars:/opt/spark/extra-jars

  spark-worker:
    image: apache_spark:3.5.1
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    depends_on: [spark-master]
    environment:
      SPARK_NO_DAEMONIZE: "true"
      SPARK_WORKER_MEMORY: 2g
      SPARK_WORKER_CORES: 2
    volumes:
      - .:/opt/spark-data
      - ./ingestion/spark-batch:/opt/jobs/ingestion
      - ./transform:/opt/jobs/transform
      - ./jars:/opt/spark/extra-jars

  spark-fact-stream:
    build:
      context: .
      dockerfile: DockerFile
    image: apache_spark:3.5.1
    container_name: spark-fact-stream
    command:
      - /opt/spark/bin/spark-submit
      - --master
      - spark://spark-master:7077
      - --jars
      - /opt/spark/jars/starrocks-spark-connector-3.5_2.12-1.1.2.jar
      - /opt/spark-data/transform/spark-streaming/kafka_to_starrocks_fact.py
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - APPLICATION_TOPIC=postgres_server.public.Application
      - HISTORY_TOPIC=postgres_server.public.Application_History
      - STARTING_OFFSETS=earliest
      - CHECKPOINT_LOCATION=s3a://lakehouse/checkpoints/fact_xu_ly_ho_so_primary_v5_business_join
      - STARROCKS_FE_HTTP_URL=starrocks:8030
      - STARROCKS_FE_JDBC_URL=jdbc:mysql://starrocks:9030
      - STARROCKS_TABLE=gold_realtime.fact_xu_ly_ho_so_stream
      - STARROCKS_USER=root
      - STARROCKS_PASSWORD=
      - SPARK_CORES_MAX=2
      - SPARK_EXECUTOR_CORES=2
      - SPARK_EXECUTOR_MEMORY=1g
      - SPARK_SHUFFLE_PARTITIONS=2
    volumes:
      - .:/opt/spark-data
    depends_on:
      spark-master:
        condition: service_started
      kafka-init:
        condition: service_completed_successfully
      debezium-init:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
      starrocks-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # ---------- CATALOG (Layer 3) — Quân ----------
  metastore-db:
    image: postgres:16
    environment:
      POSTGRES_USER: hive
      POSTGRES_PASSWORD: ${METASTORE_DB_PASSWORD}
      POSTGRES_DB: metastore
    volumes:
      - metastore-db-data:/var/lib/postgresql/data

  hive-metastore:
    image: apache/hive:4.0.0
    depends_on: [metastore-db, minio]
    ports:
      - "9083:9083"
    environment:
      SERVICE_NAME: metastore
      DB_DRIVER: postgres
      SERVICE_OPTS: >-
        -Djavax.jdo.option.ConnectionDriverName=org.postgresql.Driver -Djavax.jdo.option.ConnectionURL=jdbc:postgresql://metastore-db:5432/metastore -Djavax.jdo.option.ConnectionUserName=hive -Djavax.jdo.option.ConnectionPassword=${METASTORE_DB_PASSWORD}

  # ---------- REAL-TIME OLAP (Layer 4) — Quân ----------
  starrocks:
    image: starrocks/allin1-ubuntu:3.3-latest
    ports:
      - "8030:8030" # FE HTTP
      - "9030:9030" # FE MySQL protocol
      - "8040:8040" # BE
    volumes:
      - starrocks_data:/data/deploy/starrocks

  starrocks-init:
    image: mysql:8.0
    container_name: starrocks-init
    entrypoint: ["/bin/sh", "/opt/project/scripts/init_starrocks.sh"]
    volumes:
      - ./:/opt/project:ro
    depends_on:
      starrocks:
        condition: service_started

  # ---------- QUERY ENGINE (Layer 4) — Trung ----------
  trino:
    image: trinodb/trino:453
    depends_on: [hive-metastore, minio]
    ports:
      - "8082:8080"
    volumes:
      - ./transform/metastore/trino-catalog:/etc/trino/catalog

  # ---------- PRESENTATION (Layer 5) — Trung ----------
  superset:
    image: apache/superset:4.0.2
    depends_on: [trino, starrocks]
    ports:
      - "8088:8088"
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}

  # ---------- ORCHESTRATION (Layer 6) — Thành ----------
  airflow-db:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: ${AIRFLOW_DB_PASSWORD}
      POSTGRES_DB: airflow
    volumes:
      - airflow-db-data:/var/lib/postgresql/data

  airflow:
    build:
      context: .
      dockerfile: orchestration/airflow.Dockerfile
    depends_on: [airflow-db]
    ports:
      - "8080:8080"
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:${AIRFLOW_DB_PASSWORD}@airflow-db/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__WEB_SERVER_MASTER_TIMEOUT: "600"
      AIRFLOW__WEBSERVER__WEB_SERVER_WORKER_TIMEOUT: "300"
      AIRFLOW__WEBSERVER__WORKERS: "2"
      AIRFLOW_CONN_SPARK_DEFAULT: '{"conn_type":"spark","host":"spark://spark-master","port":7077}'
      AIRFLOW_CONN_KEYCLOAK_DEFAULT: '{"conn_type":"http","host":"http://keycloak:8080","login":"${KEYCLOAK_ROPC_USER}","password":"${KEYCLOAK_ROPC_PASSWORD}","extra":{"realm":"lakehouse","client_id":"${KEYCLOAK_CLIENT_ID}","client_secret":"${KEYCLOAK_CLIENT_SECRET}"}}'
      AIRFLOW_CONN_NIFI_DEFAULT: '{"conn_type":"http","host":"https://nifi:8443","login":"${NIFI_USER}","password":"${NIFI_PASSWORD}","extra":{"verify_ssl":false}}'
      AIRFLOW_VAR_PIPELINE_API_BASE: "http://pipeline-api:8000"
      PYSPARK_PYTHON: "/usr/local/bin/python3.12"
      PYSPARK_DRIVER_PYTHON: "python3"
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL}
    volumes:
      - ./orchestration/dags:/opt/airflow/dags
      - ./orchestration/plugins:/opt/airflow/plugins
      - ./orchestration/alerts:/opt/airflow/alerts
      - .:/opt/airflow/repo
    command: standalone

  # ---------- CONTROL-PLANE (Layer 6) — Thành ----------
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KEYCLOAK_ROPC_USER: ${KEYCLOAK_ROPC_USER}
      KEYCLOAK_ROPC_PASSWORD: ${KEYCLOAK_ROPC_PASSWORD}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET}
    ports:
      - "8180:8080"
    volumes:
      - ./platform/keycloak/realm-lakehouse.json:/opt/keycloak/data/import/realm-lakehouse.json:ro

  pipeline-api:
    build:
      context: ./platform/pipeline-api
    depends_on: [keycloak]
    environment:
      KEYCLOAK_ISSUER: http://keycloak:8080/realms/lakehouse
      WORKSPACE_ROOT: /workspace
      REGISTRY_PATH: /workspace/platform/pipeline-api/registry.yaml
      MINIO_ROOT_USER: minio_access_key
      MINIO_ROOT_PASSWORD: minio_secret_key
    ports:
      - "8000:8000"
    volumes:
      - .:/workspace:ro

  # ---------- CI/CD (Layer 7) — Thành ----------
  jenkins:
    image: jenkins/jenkins:lts
    user: root                         # Cần root để gọi Docker socket của host
    ports:
      - "8090:8080"
      - "50000:50000"                  # JNLP agent port (nếu dùng distributed build)
    environment:
      JAVA_OPTS: "-Djenkins.install.runSetupWizard=false"
    volumes:
      - jenkins-data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock   # Cho phép Jenkins gọi Docker host
      - .:/workspace:ro                              # Mount repo để copy files


  # ---------- MOCK DATA GENERATORS ----------
  mock-api:
    build:
      context: .
      dockerfile: Dockerfile.python
    container_name: mock-api
    ports:
      - "5000:5000"
    command: ["python", "mock_api_server.py"]
    volumes:
      - ./data-generator:/app

  stream-simulator:
    build:
      context: .
      dockerfile: Dockerfile.python
    container_name: stream-simulator
    command: ["python", "data_stream_simulator.py"]
    volumes:
      - ./data-generator:/app
    environment:
      - PYTHONIOENCODING=utf-8
      - DB_HOST=source_db
      - DB_PORT=5432
    depends_on:
      source_db:
        condition: service_healthy
      debezium-init:
        condition: service_completed_successfully

  data-master-gen:
    build:
      context: .
      dockerfile: Dockerfile.python
    container_name: data-master-gen
    profiles: ["manual"]
    command: ["python", "data-generator/data_master.py"]
    volumes:
      - ./:/app
    depends_on:
      - source_db

  data-transactional-gen:
    build:
      context: .
      dockerfile: Dockerfile.python
    container_name: data-transactional-gen
    profiles: ["manual"]
    command: ["python", "data-generator/data_Transactional.py"]
    volumes:
      - ./:/app
    environment:
      - MINIO_ENDPOINT=http://minio:9000
      - PYTHONIOENCODING=utf-8
    depends_on:
      - minio

volumes:
  minio-data:
  metastore-db-data:
  airflow-db-data:
  jenkins-data:
  source_db_data:
  starrocks_data:
