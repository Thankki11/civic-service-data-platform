  spark-master:
    build:
      context: .
      dockerfile: DockerFile

    image: apache_spark:3.5.1
    container_name: spark-master
    ports:
      - "8080:8080"
      - "7077:7077"
      - "4040:4040"
      - "8888:8888"
    volumes:
      - .:/opt/spark-data
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    networks:
      - spark-network

  spark-worker-1:
    image: apache_spark:3.5.1
    container_name: spark-worker-1
    ports:
      - "8081:8081"
    volumes:
      - .:/opt/spark-data
    environment:
      - SPARK_WORKER_CORES=8
      - SPARK_WORKER_MEMORY=6g
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    depends_on:
      - spark-master
    networks:
      - spark-network

  # Kafka -> physical realtime fact. Day la luong realtime chinh; driver submit
  # executor len cluster Spark cu thay vi tao worker rieng.
  spark-fact-stream:
    build:
      context: .
      dockerfile: DockerFile
    image: apache_spark:3.5.1
    container_name: spark-fact-stream
    command:
      - /opt/spark/bin/spark-submit
      - --master
      - spark://spark-master:7077
      - --jars
      - /opt/spark/jars/starrocks-spark-connector-3.5_2.12-1.1.2.jar
      - /opt/spark-data/transform/spark-streaming/kafka_to_starrocks_fact.py
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - APPLICATION_TOPIC=postgres_server.public.Application
      - HISTORY_TOPIC=postgres_server.public.Application_History
      - STARTING_OFFSETS=earliest
      - CHECKPOINT_LOCATION=s3a://lakehouse/checkpoints/fact_xu_ly_ho_so_primary_v5_business_join
      - STARROCKS_FE_HTTP_URL=starrocks:8080
      - STARROCKS_FE_JDBC_URL=jdbc:mysql://starrocks:9030
      - STARROCKS_TABLE=gold_realtime.fact_xu_ly_ho_so_stream
      - STARROCKS_USER=root
      - STARROCKS_PASSWORD=
      - SPARK_CORES_MAX=2
      - SPARK_EXECUTOR_CORES=2
      - SPARK_EXECUTOR_MEMORY=1g
      - SPARK_SHUFFLE_PARTITIONS=2
    volumes:
      - .:/opt/spark-data
    depends_on:
      spark-master:
        condition: service_started
      kafka-init:
        condition: service_completed_successfully
      debezium-init:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
      starrocks-init:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - spark-network

  nifi:
    image: apache/nifi:1.25.0
    container_name: nifi
    ports:
      - "8443:8443"
    environment:
      - SINGLE_USER_CREDENTIALS_USERNAME=admin
      - SINGLE_USER_CREDENTIALS_PASSWORD=adminadminadmin
    networks:
      - spark-network
    volumes:
