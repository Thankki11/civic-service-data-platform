  hive-metastore:
    image: starburstdata/hive:3.1.2-e.18
    container_name: hive-metastore
    ports:
      - "9083:9083"
    environment:
      HIVE_METASTORE_JDBC_URL: jdbc:postgresql://source_db:5432/metastore
      HIVE_METASTORE_DRIVER: org.postgresql.Driver
      HIVE_METASTORE_USER: source_db
      HIVE_METASTORE_PASSWORD: source_db
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minio_access_key
      S3_SECRET_KEY: minio_secret_key
      S3_PATH_STYLE_ACCESS: "true"
      REGION: "us-east-1"
      GOOGLE_CLOUD_KEY_FILE_PATH: "none"
      AZURE_ADL_CLIENT_ID: "none"
      AZURE_ADL_CREDENTIAL: "none"
      AZURE_ADL_REFRESH_URL: "none"
      AZURE_ABFS_STORAGE_ACCOUNT: "none"
      AZURE_ABFS_ACCESS_KEY: "none"
      AZURE_ABFS_OAUTH: "none"
      AZURE_ABFS_OAUTH_TOKEN_PROVIDER: "none"
      AZURE_ABFS_OAUTH_CLIENT_ID: "none"
      AZURE_ABFS_OAUTH_SECRET: "none"
      AZURE_ABFS_OAUTH_ENDPOINT: "none"
      AZURE_WASB_STORAGE_ACCOUNT: "none"
      AZURE_WASB_ACCESS_KEY: "none"
    depends_on:
      source_db:
        condition: service_healthy
    networks:
      - spark-network

  # Trino chi la query engine: doc Iceberg metadata tu Hive Metastore va data
  # Gold tu MinIO. Superset se ket noi den service nay, khong ket noi MinIO.
  trino:
    image: trinodb/trino:477
    container_name: trino
    hostname: trino
    ports:
      - "8085:8080"
    volumes:
      - ./transform/metastore/trino-catalog/iceberg.properties:/etc/trino/catalog/iceberg.properties:ro
    depends_on:
      - hive-metastore
      - minio
    networks:
      - spark-network

  # StarRocks (FE+BE trong 1 container - phu hop moi truong dev/demo).
  # Spark Structured Streaming ghi physical fact qua Stream Load HTTP.
  starrocks:
    image: starrocks/allin1-ubuntu:latest
    container_name: starrocks
    hostname: starrocks
    ports:
      - "8030:8030"   # FE HTTP (giao dien quan tri/monitor)
      - "9030:9030"   # FE MySQL protocol (mysql client, JDBC, Superset)
      - "8040:8040"   # BE HTTP (heartbeat/webserver)
    volumes:
      - starrocks_data:/data/deploy/starrocks
    networks:
      - spark-network
    depends_on:
      - kafka

  starrocks-init:
    image: mysql:8.0
    container_name: starrocks-init
    entrypoint: ["/bin/sh", "/opt/project/scripts/init_starrocks.sh"]
    volumes:
      - ./:/opt/project:ro
    depends_on:
      starrocks:
        condition: service_started
    networks:
      - spark-network

  mock-api:
    image: civic-service-data-platform-python:latest
    build:
      context: .
      dockerfile: Dockerfile.python
    container_name: mock-api
    ports:
      - "5000:5000"
    command: ["python", "mock_api_server.py"]
    networks:
      - spark-network
    volumes:
      - ./data-generator:/app

  stream-simulator:
    image: civic-service-data-platform-python:latest
    build:
      context: .
      dockerfile: Dockerfile.python
    container_name: stream-simulator
    profiles: ["streaming"]
    command: ["python", "data_stream_simulator.py"]
    networks:
      - spark-network
    volumes:
      - ./data-generator:/app
    environment:
      - PYTHONIOENCODING=utf-8
      - DB_HOST=source_db
      - DB_PORT=5432
    depends_on:
      source_db:
        condition: service_healthy
      debezium-init:
        condition: service_completed_successfully

  data-master-gen:
    image: civic-service-data-platform-python:latest
    build:
      context: .
      dockerfile: Dockerfile.python
    container_name: data-master-gen
    profiles: ["manual"]
    command: ["python", "data-generator/data_master.py"]
    networks:
      - spark-network
    volumes:
      - ./:/app
    depends_on:
      - source_db

  data-transactional-gen:
    image: civic-service-data-platform-python:latest
    build:
      context: .
      dockerfile: Dockerfile.python
    container_name: data-transactional-gen
    profiles: ["manual"]
    command: ["python", "data-generator/data_Transactional.py"]
    networks:
      - spark-network
    volumes:
      - ./:/app
    environment:
      - MINIO_ENDPOINT=http://minio:9000
      - PYTHONIOENCODING=utf-8
    depends_on:
      - minio

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - spark-network
    depends_on:
      - debezium-connect

  grafana:
    image: grafana/grafana:10.4.0
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    networks:
      - spark-network
    depends_on:
      - prometheus

volumes:
  minio_storage:
  source_db_data:
  starrocks_data:
  kafka_data:
  zookeeper_data:
  zookeeper_log:


networks:
  spark-network:
    driver: bridge
